<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대리점 전용 페이지</title>

<style>
body {
  background:#0f1115;
  color:#e0e0e0;
  font-family:Malgun Gothic,Arial;
  margin:0;
}

.hidden { display:none !important; }

#login-section {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0f1115;
}

.login-box {
  background: #161a20;
  padding: 30px;
  border-radius: 10px;
  width: 460px; 
  box-shadow: 0 0 30px rgba(0,0,0,.8);
  text-align: center;

  /* --- 세로 정렬 설정 --- */
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* 공통 스타일: input과 button의 크기를 똑같이 맞춤 */
input, button {
  width: 300px;
  height: 45px;
  box-sizing: border-box;
  border-radius: 6px;
  font-size: 16px;
  text-align: center;
}

input {
  background: #0f1115;
  border: 1px solid #2a2f3a;
  color: #fff;
  padding: 0 12px;
}

button {
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

/* 각 버튼별 색상만 따로 설정 */
.login-btn { 
  background: #2d6cdf; 
  color: #fff; 
}
.login-btn:hover { background: #2458b8; }

/* 메인 화면의 시트 전환 버튼 */
.btn-swap {
  width: auto;
  min-width: 120px;
  padding: 0 15px;
  height: 45px;
  font-size: 14px;
}

.protect-btn {
  margin-top: 10px;
  background: #0f1115;
  border: 2px solid #ff5252;
  color: #ff5252;
  font-weight: bold;
}
.protect-btn:hover { 
  background: #ff5252; 
  color: #0f1115; 
}

/* 검색창 전용 설정 (노란 배경 유지) */
#searchInput {
  background: #ffeb3b;
  color: #000;
  border: 1px solid #fdd835;
}

/* 합쳐진 검색창 스타일 및 placeholder 색상 */
#searchInput::placeholder {
  color: #444;
}

#content {
  padding:20px;
}

#top-bar {
  display:flex;
  justify-content:flex-start;
  align-items:center;
  margin-bottom:10px;
}

#sheet-name { font-size:2em; font-weight:bold; }

.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 80vh;
}

table {
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}

th, td {
  padding:8px 12px;
  border-bottom:1px solid #333;
  white-space:nowrap;
}

th {
  background:#202b38;
  position:sticky;
  top:0;
  z-index:10; /* 스티키 헤더가 테이블 셀 위에 나오도록 */
}

td:hover {
  white-space:normal;
  background:#2a3a4a;
}

/* 검색박스: display:flex으로 gap이 동작하도록 하고 너비 설정 추가 */
#search-box {
  display:flex;
  width:30ch;
  gap:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- 로그인 -->
  <div id="login-section">
  <div class="login-box">
    <h2>에스틱 대리점 전용 페이지</h2>
    <input type="password" id="pass" placeholder="비밀번호 입력"
           onkeypress="if(event.key==='Enter') login()">
    <button class="login-btn" onclick="login()">접속하기</button>

    <button id="protectBtn" class="protect-btn"
      onclick="location.href='https://docs.google.com/forms/d/e/1FAIpQLSetZPoILgJ7bKKh4foBkncz_UsZFQTBvX04AMzKoUli0gUXuQ/viewform'">
      보호요청은 이곳을 클릭
    </button>
  </div>
</div>

<!-- 메인 -->
<div id="content" class="hidden">
  
  <div class="control-section">
    <div id="top-bar">
      <button class="btn-swap" onclick="swapSheet()" disabled>🔁 시트 간 전환</button>
      <span id="sheet-name"></span>
    </div>

    <div id="search-box">
      <input type="text" id="searchInput" placeholder="검색어 입력" onkeyup="filterTable()">
    </div>
  </div> <hr class="divider">
  
  <div id="table-container"></div>

</div>

<script>
// ⭐ Vercel Proxy URL로 변경
const WEBAPP_URL = '/api/proxy';

let currentSheet = 0;

/** 안전한 응답 파서: JSON 컨텐츠면 JSON으로, 아니면 텍스트로 반환 */
function parseMaybeJson(response) {
  const ct = response.headers.get('content-type') || '';
  if (ct.includes('application/json')) {
    return response.json();
  }
  return response.text().then(txt => {
    try {
      return JSON.parse(txt);
    } catch (e) {
      return txt;
    }
  });
}

/** 간단 HTML 이스케이프 (셀 내용에 HTML이 섞여있을 수 있어 기본 억제) */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function login() {
  const pw = document.getElementById('pass').value.trim();
  if (!pw) {
    alert('비밀번호를 입력하세요.');
    return;
  }

  // ⭐ action을 'login'으로 설정
  const body = { 
    action: 'login',
    password: pw 
  };

  fetch(WEBAPP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
  .then(res => {
    if (!res.ok) throw new Error('Network response was not ok: ' + res.status);
    return parseMaybeJson(res);
  })
  .then(res => {
    // 서버가 평문("OK" 등)을 보낼 수도 있으므로 타입 체크
    if (typeof res === 'string') {
      console.warn('서버가 JSON이 아닌 응답을 반환했습니다:', res);
      alert('서버 응답이 예상과 다릅니다. (콘솔 확인)');
      return;
    }

    if (!res || res.success === false) {
      alert('비밀번호 오류');
      return;
    }

    // 로그인 성공 처리
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');

    const pb = document.getElementById('protectBtn');
    if (pb) pb.remove();

    if (res.name || res.data) {
      document.getElementById('sheet-name').innerText = '📄 ' + (res.name || '');
      makeTable(res.data || []);
    } else {
      loadSheet(0);
    }
  })
  .catch(err => {
    console.error('login fetch error:', err);
    alert('통신 오류 또는 서버 오류가 발생했습니다. 콘솔을 확인하세요.');
  });
}

/* 시트 로드 (POST로 안전하게 요청) */
function loadSheet(idx) {
  currentSheet = idx;
  document.getElementById('searchInput').value = '';

  const body = { action: 'getSheetByIndex', index: String(idx) };

  fetch(WEBAPP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
  .then(res => {
    if (!res.ok) throw new Error('Network response was not ok: ' + res.status);
    return parseMaybeJson(res);
  })
  .then(res => {
    if (typeof res === 'string') {
      console.warn('서버가 JSON이 아닌 응답을 반환했습니다:', res);
      alert('시트 로드 실패: 서버 응답이 예상과 다릅니다.');
      return;
    }

    if (!res || res.success === false) {
      alert('시트 로드 실패: ' + (res && res.msg ? res.msg : 'unknown'));
      return;
    }
    document.getElementById('sheet-name').innerText = '📄 ' + (res.name || '');
    makeTable(res.data || []);
  })
  .catch(err => {
    console.error('loadSheet fetch error:', err);
    alert('통신 오류 또는 서버 오류가 발생했습니다. 콘솔을 확인하세요.');
  });
}

/* 스왑 */
function swapSheet() {
  loadSheet(currentSheet === 0 ? 1 : 0);
}

/* 테이블 (간단한 이스케이프 처리 포함) */
function makeTable(data) {
  if (!Array.isArray(data)) {
    document.getElementById('table-container').innerHTML = '<div>데이터 형식이 올바르지 않습니다.</div>';
    return;
  }

  let html = '<div class="table-wrap"><table>';
  data.forEach((r, i) => {
    if (i === 0) {
      html += '<thead><tr>';
      r.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
      html += '</tr></thead><tbody>';
    } else {
      html += '<tr>';
      r.forEach(c => html += `<td>${escapeHtml(c)}</td>`);
      html += '</tr>';
    }
  });
  html += '</tbody></table></div>';
  document.getElementById('table-container').innerHTML = html;
}

/* 검색 */
function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#table-container tr').forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(q) ? '' : 'none';
  });
}
</script>

</body>
</html>
